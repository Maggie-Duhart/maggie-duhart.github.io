<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Inmobiliaria IA | Acceso Exclusivo</title>
    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f8f9fa;
            --text: #202124;
        }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            color: var(--text);
            overflow: hidden;
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); 
            text-align: center; 
            max-width: 450px;
            border: 1px solid #eee;
        }
        .logo {
            font-size: 40px;
            margin-bottom: 20px;
        }
        h1 { 
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px; 
            color: #111;
        }
        p { 
            line-height: 1.6; 
            color: #5f6368;
            font-size: 15px;
        }
        .badge { 
            display: inline-block; 
            padding: 6px 16px; 
            background: #e8f0fe; 
            color: var(--primary); 
            border-radius: 100px; 
            font-size: 13px; 
            font-weight: 500; 
            margin: 15px 0;
        }
        .info-box {
            margin-top: 25px;
            padding: 15px;
            background: #f1f3f4;
            border-radius: 12px;
            font-size: 13px;
        }
        .info-box b { color: #1e8e3e; }
        
        /* Estilo para ocultar contenido hasta que se logueen */
        #main-content { display: none; }
    </style>
</head>
<body>

    <script>
        (function() {
            var password = prompt("Bienvenida, Maggie. Ingresá la clave de acceso para la demo:");
            if (password === "meli2026") { // <--- CAMBIÁ TU CLAVE AQUÍ
                alert("Acceso concedido.");
            } else {
                alert("Clave incorrecta.");
                window.location.href = "https://www.google.com"; // Los saca de la página
            }
        })();
    </script>

    <div class="card">
        <div class="logo">🧉</div>
        <h1>Asesor Inmobiliario IA</h1>
        <p>Plataforma de testeo exclusiva para el análisis de propiedades en <b>Belgrano y Núñez</b> mediante Inteligencia Artificial.</p>
        
        <div class="badge">Sistema Conectado a Mercado Libre</div>

        <div class="info-box">
            Cotización Oficial: <b>1 USD = $1406,21</b><br>
            <span style="color:#888; font-size:11px;">Actualizado: 1 de Marzo, 2026</span>
        </div>
    </div>

    </body>
</html>

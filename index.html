<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesor Inmobiliario IA | Demo Exclusiva</title>
    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f8f9fa;
            --text: #202124;
            --text-secondary: #5f6368;
        }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            color: var(--text);
        }
        .card { 
            background: white; 
            padding: 50px 40px; 
            border-radius: 28px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
            text-align: center; 
            max-width: 480px;
            width: 90%;
            border: 1px solid #eee;
        }
        .icon {
            font-size: 55px;
            margin-bottom: 20px;
        }
        h1 { 
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 15px; 
            color: #111;
        }
        p { 
            line-height: 1.6; 
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        /* Contenedor del Buscador Real */
        .search-container {
            position: relative;
            margin-bottom: 30px;
        }
        #searchWidgetTrigger {
            width: 100%;
            padding: 15px 20px;
            border-radius: 12px;
            border: 2px solid #e8eaed;
            font-size: 16px;
            color: #333;
            box-sizing: border-box;
            background-color: #fcfcfc;
            text-align: left;
            outline: none;
            transition: border-color 0.3s ease;
        }
        #searchWidgetTrigger:focus {
            border-color: var(--primary);
        }
        .search-button {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .info-box {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 16px;
            font-size: 14px;
            border: 1px solid #eee;
        }
        .rate {
            font-size: 18px;
            font-weight: 700;
            color: #1e8e3e;
            display: block;
            margin-top: 5px;
        }
        /* Estilizado del Widget lateral para que no tape todo */
        gen-search-widget {
            --gen-search-widget-container-max-height: 80vh;
        }
    </style>
</head>
<body>

    <script>
        (function() {
            var password = prompt("Acceso Restringido. Por favor, ingresá la clave para la demo:");
            if (password === "asesoria2026") {
                console.log("Acceso concedido.");
            } else {
                alert("Clave incorrecta. Redirigiendo...");
                window.location.href = "https://www.google.com"; 
            }
        })();
    </script>

    <div class="card">
        <div class="icon">🏡</div>
        
        <h1>Asesor Inmobiliario IA</h1>
        
        <p>Plataforma de testeo exclusiva para el análisis de propiedades en <b>Belgrano y Núñez</b> mediante Inteligencia Artificial.</p>
        
        <div class="search-container">
            <gen-search-widget
              configId="fff62396-38e9-43eb-9ce0-4ccdd3261143"
              location="global">
            </gen-search-widget>

            <input placeholder="Consultar por barrios o precios..." id="searchWidgetTrigger" />
            <button class="search-button">Buscar</button>
        </div>

        <div class="info-box">
            <span style="color:#666;">Cotización Oficial Aplicada:</span>
            <span class="rate">1 USD = $1406,21</span>
            <span style="color:#999; font-size:12px;">Actualizado: 1 de Marzo, 2026</span>
        </div>
    </div>

    <script src="https://cloud.google.com/ai/gen-app-builder/client?hl=en_US"></script>

</body>
</html>

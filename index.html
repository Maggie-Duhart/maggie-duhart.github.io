<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesor Inmobiliario IA | Demo Exclusiva</title>

    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f8f9fa;
            --text: #202124;
            --text-secondary: #5f6368;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text);
        }

        .card {
            background: white;
            padding: 50px 40px;
            border-radius: 28px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.06);
            text-align: center;
            max-width: 520px;
            width: 92%;
            border: 1px solid #eee;
        }

        .icon {
            font-size: 55px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #111;
        }

        p {
            line-height: 1.6;
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 28px;
        }

        /* SEARCH AREA */
        .search-container {
            position: relative;
            margin-bottom: 30px;
            text-align: left;
        }

        #searchWidgetTrigger {
            width: 100%;
            padding: 16px 20px;
            border-radius: 14px;
            border: 2px solid #e8eaed;
            font-size: 16px;
            color: #333;
            box-sizing: border-box;
            background-color: #fcfcfc;
            outline: none;
            cursor: pointer;
            transition: 0.2s ease;
        }

        #searchWidgetTrigger:hover {
            border-color: var(--primary);
            background: #fff;
        }

        .search-button {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 500;
            pointer-events: none;
        }

        /* evita que el widget herede el centrado */
        gen-search-widget,
        gen-search-widget * {
            text-align: left !important;
        }

        .info-box {
            padding: 18px;
            background: #f8f9fa;
            border-radius: 16px;
            font-size: 14px;
            border: 1px solid #eee;
        }

        .rate {
            font-size: 18px;
            font-weight: 700;
            color: #1e8e3e;
            display: block;
            margin-top: 6px;
        }

        /* mejora legibilidad resultados */
        gen-search-widget {
            font-size: 15px;
            line-height: 1.6;
        }

        /* responsive */
        @media (max-width: 480px) {
            .card {
                padding: 35px 22px;
            }

            h1 {
                font-size: 22px;
            }

            p {
                font-size: 15px;
            }
        }
    </style>
</head>

<body>

<script>
(function() {
    var password = prompt("Acceso Restringido. Clave de la demo:");
    if (password !== "asesoria2026") {
        alert("Clave incorrecta.");
        window.location.href = "https://www.google.com";
    }
})();
</script>

<div class="card">
    <div class="icon">🏡</div>

    <h1>Asesor Inmobiliario IA</h1>
    <p>Análisis de propiedades mediante Inteligencia Artificial.</p>

    <div class="search-container">

        <gen-search-widget
            configId="fff62396-38e9-43eb-9ce0-4ccdd3261143"
            triggerId="searchWidgetTrigger">
        </gen-search-widget>

        <input
            placeholder="Consultar por barrios, precios o ambientes…"
            id="searchWidgetTrigger"
            readonly
        />

        <button class="search-button">Buscar</button>

    </div>

    <div class="info-box">
        <span style="color:#666;">Cotización Oficial Aplicada:</span>
        <span class="rate">1 USD = $1425</span>
        <span style="color:#999; font-size:11px;">Actualizado: 8 de Marzo, 2026</span>
    </div>
</div>

<script src="https://cloud.google.com/ai/gen-app-builder/client?hl=es"></script>

</body>
</html>
